body:
  text: 傳既成遣人以錦囊盛一本齎疏一通以八月二十八日至真容院文殊前表明疏文曰近者親詣臺山獲瞻聖像慈悲赴感殊勝現前慶雲紛郁於虛空寶焰熒煌於巖谷同僧祇之隊仗不可說之聖賢大風昏霾愈彰瑞相赤壁峭絕更示真身商英直以見聞述成記傳庶流通於沙界或誘掖於信心使知我清涼寶山眷屬萬人之常在金色世界天龍八部之同居叩梵宇以贊明冀導師之證察僧正省奇集僧眾八十餘人讀疏訖菩薩殿內忽現金燈四十餘遍商英思有以歸奉者即自塑泥像以十一月出按民兵八日齎像於菩薩前發願其文曰一切處金色世界真智所以無方東北方清涼寶山幻緣所以有在無方則一塵不立有在則三界同瞻我是以投體歸依雨淚悲仰伏念商英昔在普光殿內或於大覺城東一念差殊四生流浪出沒於三千剎土纏綿於十二根塵以往善因值今勝事荷剎那之方便開無始之光明揣俗垢之已深恐慢幢之猶在託之土偶明此願輪三界空而我性亦空孰真孰妄十方幻而我形亦幻何異何同伏願菩薩攝入悲宮接歸智殿起信足於妙峯山頂資辯河於阿耨池中誓終分段之身更顯希奇之作讀文訖殿內現金燈三其日大雪雪止之後五色祥雲遍空其夕清輝閣前羅睺殿左右現銀燈十四黃嵬嶺上現大白光三翌日五色雲自辰及申盤繞不散至夜雪作商英祝曰昨日銀燈光焰微細與六七月所見不侔豈商英黑業所招抑聖賢變化亦有春夏秋冬之異常聞諸佛諸大菩薩身光蔽映魔宮猶如聚墨若隨時小大則一大藏教乃是虛言於是閣前雪中現向所見大金光三商英即踊躍拜辭曰大雪現燈非所求也命開菩薩殿取續書所見於後既開殿愛慕不能自已又祝曰待罪本路儻未罷去明年五六月乃可再來頗更一瞻光相滿願而去良久於閣前再見大金光四明年夏六月以并亢旱詣山祈求雨澤因安奉羅睺菩薩聖像乙巳平旦至中天閣東南林麓忽變金色有青赤光直起鮮明奪目移時乃隱日昳登清涼山有五色異氣為菩薩騎師子之像丙午至真容院具威儀迎所安羅睺像比及寺門而報者曰殿中燈且現矣既謁菩薩瞻仰之次頂上寶蓋忽爾明朗主殿僧曰此殿幡蓋無數掩蔽稠密而頂蓋最高隱莫能辨今爛若此未之有也是夕東臺洎羅睺殿左右現十餘大金燈往來上下或移時或移刻或良久丁未詣菩薩前白言華嚴經中世尊八處放光表法此光若是法性本有無相之光視之不見則商英不疑若是諸佛果德圓滿之光使人可見則願為示現於是頂上寶蓋忽然通明孔隙流光迸射四出已而襟領間如意間各放寶光燁燁閃動又於殿前金蓮花葉燈焰交輝開合無數是時遠近僧俗千數雲集呼而視之歡呼震動繼以悲淚各各歎言無始以來罪戾深重請從今日改往修來戊申詣中臺日將暝四山青黯忽有異氣橫跨北臺山如爛銀刻劃長十丈眾呼曰銀橋現商英曰非也此殆白銀階道聖賢所游躡者也俄而現寶燈一分而為二時有游僧十數人已歸臺屋止宿呼而視之眾僧叩頭念佛商英曰此處當有三燈各各諦觀良久三燈齊現商英取續傳示之曰吾去年所書如東方心宿豈妄語邪己酉太原僉判錢景山及經略司管句機宜文字邵壎來會於東臺而商英已還真容院即遣人招二君還二君曰適已於東臺見圓光攝身光矣但未見聖燈也是夕遂與二君祈燈而觀焉庚戌宿佛光寺祥雲異氣繽紛無數辛亥往祕巖未至巖之三里直光現既至巖而盧舍那佛面門放光照耀滿殿初夜於層崖間現大金燈五壬子出巖於空中現金橋一此橋不依山谷不依雲氣不假日光亘空黃潤如真金色嗚呼當處出生當處入滅非大幻善巧方便其孰能與於此哉是行也既以旱祈雨在山三禱三應但須臾即霽癸丑還至代州大雨彌日將槁之苗變為豐歲商英即以其事奏聞其略曰臣近以本路亢旱躬詣五臺山文殊像前及五龍池祈求雨澤晝夜所接靈光寶焰殊形異相赫奕顯耀莫可名狀是時四方僧俗千餘人同共瞻覩歡呼之聲震動山谷已而時雨大降彌覆數州臣之始往草木萎悴農夫愁嘆及其歸也木麻蕎菽青綠生動村落謳歌指俟大稔此蓋朝延有道眾聖垂佑有司推行詔條布之於名山異境其應如響勘會五臺山十寺舊管四十二莊太宗皇帝平晉之後悉蠲租賦以示崇奉比因邊臣謾昧朝延其地為山荒遂摽奪其良田三百餘頃招置弓箭手一百餘戶因此逐寺詞訟不息僧徒分散寺宇隳摧臣累見狀乞給還終未蒙省察臣竊以六合之外蓋有不可致詰之事彼化人者豈規以土田得失為成與虧但昔人施之為福田後人取之養鄉兵於理疑若未安欲乞下本路勘會如臣所見所陳別無不實即乞檢會累奏早賜施行雖然如是彼大士以十方三界為一毘盧遮那座體而商英區區以數百頃田浼之其志趣狹劣不亦悲乎附傳續傳既行信而遊者發於誠心靡不感應四年二月本路都總管司走馬承受公事劉友端於羅睺殿前雪中祈見金燈一分而為三躍而上者一五月末轉運司句當公事傅君俞於中臺祈見圓光五攝身光一清輝閣前雨中飛金燈一經略司准備差遣潘璟於清輝閣前松林中祈見白光三道直起萬菩薩隊仗羅列金色師子遊戲奮迅金殿一圓光三圓光中現佛頭如地踊狀一菩薩騎師子一白衣觀音一金橋三銀燈一而往來者八金燈三而明滅者十五璟自以三世奉羅漢一生以醫術濟人而未覩羅漢藥王相狀默有所禱行至金閣空中現大金船一上有羅漢數百行者立者禮拜者又行至藏頭見白雲西來藥王菩薩立於雲端心冠大袖皂絛皂屨凡璟之所見獨多且異不可具紀六月末僧溫約自京來施金襴袈裟及齎內中香來監鎮曹諝晨至菩薩殿啟香之際殿前長明燈上忽吐大金光如車輪飛照殿中經略司句當公事李毅侍其母親及陽曲縣尉江沄之母王氏遊祈見圓光攝身光直光金燈毅以書來言曰今日乃知續傳非虛也資政殿學士知河南府李清臣聞之曰文殊與釋迦文異名一體雖已為古佛其實壽蔽天地示跡垂化尚爾老婆心龍圖閣學士本路經略安撫使曾布曰布昔移帥廣東遊廬山天池登文殊臺大風振林木昏霾咫尺不辨道路燈燭火炬俱滅而下視莽蒼中金燈四出或遠或近或大或小或隱或現會夜分疲寢所見蓋有未盡者然大風所不能摧昏霾所不能掩非大光明有無量神力不可思議其孰能若是乎顧言之難信不敢紀以示人及觀天覺續清涼傳則布之聞見未足怪也或謂商英曰外道波旬大力鬼神山精木魅皆能為光為怪子何信之篤邪答曰爾所謂光怪或道果垂成見而試之或正法將勝出而障之今吾與諸人自視決然未有以致光怪者夫何疑哉精進精進損之又損運木杓於粥鍋乃吾曹之常分又述二頌有序商英及汾州西河宰李傑同謁無業禪師塔惜其摧腐相與修完既而塔放光又夢無業從容接引覺而閱其語見無業問馬祖西來心印祖云大德正鬧在且去無業去祖喚云大德無業迴首祖云是什麼商英因此豁然省悟臺山所見及作二頌曰四入臺山禮吉祥五雲深處看熒煌而今不打這鼓笛為報禪師莫放光是什麼是什麼羅睺殿前燈似火不因馬祖喚回洎被善財覷破毘嵐風急九天高白鷺眼盲魚走過供備庫使同管句河東㳂邊安撫司公事侍其瓘元祐庚午守祁陽時提刑張公行部過郡以所續五臺清涼傳記出示於瓘乃張公前領憲河東日紀五臺山文殊菩薩化現之事殊勝奇異寔耳所未聞目所未覩瓘閱之再三恨未得其便以瞻禮聖境然渠渠惓惓之心未忘於寤寐也一夢高塔前數紫衣僧拜禮傳呼菩薩出現瓘亦從而瞻望久之既覺則以謂精神思慮所致默且記識是歲五月忽誤恩就移副綏之任偶僚友相告曰夏暑長途可畏白雲自㵎底湧出直上省奇曰此祥雲也映山如銀屏壁立不動須臾現圓光四最後現攝身光一環如大車輪五色煥爛無可擬比者不假雲氣不假日光現於盤石之上相去目前無數尺之地自見己身背影於光相之內移刻方散僧眾咸相謂曰現圓光於雲中屢獲瞻禮若盤石之上咫尺之間從來未之見也共覩者百餘眾莫不叩頭作禮起敬信心讚嘆其至誠感應如此之異少頃雲散霧合繼之微雨遂與眾下臺逼以之官異日出山瓘以自信之篤不復語諸人以瓘今日所覩光相信乎昔日張公所見聖像殊勝靈光寶焰豈妄語哉瓘遂作書以告其事於張公公答書云先自得公書欲遊臺山出於至誠必知有所見始知古人無量劫修行因果不味豈可與聾俗道也續傳後可序述所見并詩於後不以誇人要與天下人生信心此受佛記莂之意也瓘故書之於後覽之者以予言是邪非邪待信者而後信之予言固無妄矣奉議郎守尚書刑部員外郎措置會計河東路財用錢蓋一心歸命敬白大慈大悲大聖文殊師利菩薩摩訶薩伏念蓋幸生人世忻遇好時得男子身六根完具偶緣世賞獲齒仕途愧無補於事助徒自益於過惡而況經無量劫造罪等恒河沙自非夙荷於覺慈豈免永沈於異趣用是久虔一念願至五峯澡雪其心懺揚其咎今者幸緣將命恭叩靈場瞻萬德之容儀覩千種之光相豈惟見所未嘗見實亦聞所未嘗聞退顧冥頑真為容遇既伸慶懺謹稽首拜手而說偈言稽首文殊師昔為七佛祖嘗發大悲願廣度諸有情念彼東北方是為清涼境龍神五百俱眷屬萬菩薩設化於此土示現無量光聞者嘆希有何況目所見我於曩劫中曾種種供養今復得親近瞻覩異於常念無始劫來有塵沙數罪一獲光明相釋然盡消滅又念諸眾生與我同體性乘此勝妙力離苦悉解脫我今永歸依敬禮發弘誓願盡未來際常居佛會中一聞微妙音即證無上道十方虛空界一切諸有情盡願同我心速悟無生忍建中靖國元年六月八日拜讚遊臺錄附之於右云建中靖國元年吳興錢蓋將命河東六月自雁門趨定襄三日經臺山真容院時樂安任良弼太原王直方偕行是夕禱於瑞應軒有銀燈現北臺之西次日供養真容及諸聖像己午後現菩薩大真相於白雲之端乘從悉備又覩金色世界輝耀遠邇是夕復現金燈大如盤盂在軒前松林之杪五日先登東臺申後現五色祥雲如寶陀羅山狀徐現白直光三其高亘天紅碧直光二橫徹數里圓光二其一如方出之日又現金燈十餘其一如蠟炬有光甚明六日遊北臺至中臺烈日無雲未後懇禱先現五色祥雲無數其間有七寶樹及寶座芝草之狀前有人設拜者冠帶皆具已而白雲起於真容院之上及諸山間遂東方現圓光及金橋三道平而欄桂皆足橋之上現菩薩隊仗又於雲中間現華嚴境界金碧寶階彩錯煥爛并現踞地白金師子耳目形儀如生因祈光相附近以表信心遂於巖下現圓光或大或小無數徐合而為一凡三重五色八暈中有菩薩乘師子像又現圓直金光抵暮方罷七日早拜請攝身光相即現於中臺之西凡六七別現通身光二及五色圓光五七十數繼而彩雲起於谷口直上遍覆西臺久且不散復於雲中現金橋及巖下現數大圓光遇近眾人上有焰光四出者凡種種奇特既異於常又累日晴霽無雨合道場眾歡喜踊躍歎未之聞見也然此姑紀其大概餘纖悉未易敷述先是朔日離雁門方及中塗已有五色直光現於臺山之北乃兆茲日靈跡既還真容院陳供飯僧信禮敬謝而去題五臺真容院濮陽李師聖述梵書五頂清涼府冬氷夏雪無炎暑我來七月愁盡寒何況蕭蕭秋作雨信無殘暑亦無寒迴然天界精神聚真容古基鷲峯寺高山之麓雄今古西方樓觀縹緲間燦然金碧蓮花宇懸崖峻嶺架大木神物所持憑險阻金璫垂空殿簷響森森鐵鳳相交舞憶昔文殊出大宅金剛寶窟通西土牽牛老人飲玉泉二子一犬為貧女變化無方饒益情如是西天七佛祖重聞清涼之境界無窮陳迹書妙語我有誠心頗出群瑞應神奇目親覩須臾光相現咫尺玉洞金燈明可數松杉搖空山谷中夜寂太陰隱龍虎丹樓碧閣香案前敬畏生心誰敢侮從來昏述如夢迴前三後三慎莫取我今不作前後想香煙稽首清涼主崇寧三年七月二十九日焚香拜讚臺山瑞應記江東朱弁撰諸佛菩薩與大阿羅漢悲憫一切有情常出光景以導迷起信攝服同異凡山地勝所示現境界有趾斯至有目斯都以是因緣故握符御極宅中圖本者往往布慈雲以覆之揭慧日以烜之霈法雨以濡之而不忘囑累之重如天臺五臺比州郡別置僧官使董正其徒而莊嚴宮殿蓋螺髻寶輪威神所宅不可不肅也雁門史君折侯彥文下車未逾時以赤子弄兵㵎谷衣繡持斧迹捕至臺下與邑之令佐奉香火作禮於狻猊座前五香之煙遍滿空際兮直上倏然改容引人四顧目不得瞬無小無大各有所見為五色雲者七為白雲者六為黑雲者一為金橋者三為圓光者五五色雲有戴白雲為冠而其中有洞者有如圓光者有如日暈五色六七重者有如孤石蒼黑圓而聳出者有如仙花之敷紛者有如仙花而現菩薩像於其上者白雲中亦有菩薩端嚴相者有奮迅如文殊所乘者有天橋如龍之上飛者有橫光青紅黃綠而相間者有如玉石為佛冠者黑雲中有獨現師子者金橋有如鯨鯢負天者有如螮崠而中斷者有重疊如魚鱗相次者圓光有玉連環者有現金網而光耀奪人目者史君圖其事而謂予曰此吾與眾人所可見者也若其他變態百工所不能狀者吾亦不能言也子其為我記之予曰曼殊室利住此山中誘接群迷示此方便史君得其開示豈無所因哉昔世尊在舍衛國舉身放光其光金色繞祇陀園周遍七匝照須達舍猶如段雲亦作金色須達者佛之大檀越也光明所燭先至其舍蓋以導迷起信攝服同異也山之上首僧明崇嘗謂我侯家世奉佛自高曾來尤於茲山開大施門則曼殊室利今所示現亦猶世尊之於須達也可不記乎予聞無盡居士在元祐中嘗遊此山矣作清涼傳神化變異與身所親覩者靡不具載而味禪悅者或有為病予謂無盡平生運佛菩薩慈以濟世拯物清涼之述所以化導未悟亦為眾人設耳以是身心無適不可故於時為元首則黎民所宗仰於法為外護則釋子所依賴史君能不墜世芬以無盡之心為心用報曼殊室利所以開示之意乃予素所期也亦予之樂書也始予欲為史君記其事而未果也而油幕諸公宛轉道史君之懇既不可辭又嘗見其上首曰明崇者言當是時我與僧正精惠大德麟府總制折可直暨寺眾實從史君所共覩也茲事不誣於是乎書皇統辛酉六月辛巳日後序紫府真容院松溪老人文珫述伏聞大聖度生應迹無方所現之處無非利益雖不局於形教使歸心有在唯止一方故我文殊大士妙踐真覺廓淨塵習寂寥於萬化之域動用於一區之中示居因位果徹因源不捨悲心恒居紫府三千界內有清涼之一名萬億國中無文殊之二號淨居梵世服道而傾心花藏欲天飡風而合掌是以統十千之眾聖伏五百之毒龍金燈夜燦爃煌於碧嶂之前瑞氣曉迎閃灼於翠峯之上奇葩天墜豈局之於春秋明月泉生寧分之於晦朔自斯歷代王臣敬禮積著彌繁傳照百燈相繼不絕胡可勝言昔宋朝丞相無盡居士天覺夢遊紫府既至無殊見不思議之境界覩無窮數之神光具奏帝聞重加修葺莊產土田倍加先帝山門榮耀緇侶汪洋自此洪巖巨壑峭壁荒谿古之伽藍無不周備可謂名高百代道光千載朝臣奉信競趣寶方續傳流通至今無替迄於逝金猶存松風靈跡詩頌歌詞清涼等傳十有餘本近因兵革屢遭火廢墮蕩無遺幸於河西僧法幢處得清涼傳一部余鈔綠編集校勘無差訪諸有緣刻板流行本山僧義祥者英俊博學崇賢好古愍余哀懇罄自衣盂并誘信士命工鏤板不日而成祝余曰山門老宿知事多矣序述來由續之傳後余先勸請今既工畢事不獲已聊述云耳以此洪因祝嚴皇帝萬歲臣宰千秋內宮天眷福祿遐昌助緣施主增添壽算法界有情同登覺岸洪武廿七年六月十有九日余與四眾百十餘人遊臺山禮文殊化境所覩光相聖燈千變萬態靈異叵測乃踊躍無量喜不自勝真所謂曠劫塵勢一時頓盡矣遊覽之間偶遇寶峯金禪者亦淳厚人也就於清涼古剎罄捨衣資接納遊禮緇素三載如初四事之需無所乏少實法門中苦行興福僧也余甚佳之一日炷香作禮曰此山乃大聖所居師幸特未瞻禮可謂千載之難逢也自古遊觀之士率多王臣貴族碩德大儒咸有詩偈發揮聖迹請師一言讚詠聖境及策發余懷不亦可乎余曰大聖境界以虛空為口須彌為舌尚不能讚其萬分之一況大聖不思議境界智識豈能到乎辭不獲已遂書拙偈以塞其請云上人覲禮曼殊叟親聞震地金毛吼胸次狐疑悉蕩絕日午面南看北斗五峯森聳侵天長俯視眾剎如鋪張大地山河作金色樹林池沼騰輝光寶劍倚天寒聖凡情盡掃五百賢聖僧當下離煩惱靠倒釋迦老子掀翻居士淨名釋迦分疎不下居士飲氣吞聲殺活縱擒出思議逆行順化超常情刀山與婬舍常談四諦輪耳根塞却方真聞大智洞明非外得屠沽負販皆玄門道人擬欲重相見翻身拶倒光明殿頂門眼正沒嫌猜佛頭佛頭全體現從此遍遊諸佛剎於諸佛所聞妙法一一三昧得總持利他自利原無乏崇善住山雁門野衲子菴性徹洞然書于臺山清涼石上古并崇善禪寺常住記釋慧祥清涼傳見宋史志廣傳續傳則史志及諸家藏書志俱不著錄杭州何夢華元錫得之示阮文達文達繕錄進呈世乃知有此書第天府卷軸既非草茅能窺阮氏文選樓書又燬於火藏書家以不得見為憾聞此書原本今藏歸安陸氏皕宋樓武陵趙君伯藏于密為居閒得借讀紙脆殆不可觸內佚廣傳中卷清翊恐其日就湮沒方錄付梓頗以佚卷為憾適錢塘丁氏正修堂藏有鈔本則佚卷存焉亟合梓之甫成全璧鈔本譌字頗多然無可校正姑仍其舊憶咸豐同治閒遊跡淹留太原距臺山僅數百里塵鞅牽絆竟未游禮靈峯今筋力日衰息影東南五頂雲山無因投跡香火緣慳撫書慨嘆光緒甲申十月吳縣蔣清翊字敬臣識四庫未收書目提要儀徵阬氏揅經室外集古清涼傳二卷廣清涼傳三卷續清涼傳二卷唐釋慧祥撰古清涼傳宋釋延一撰廣清涼傳續清涼傳宋張商英朱弁所撰廣續二編藏書家多未著錄惟古清涼傳見宋史藝文志凡方城名勝及高僧靈跡莫不詳載延一收捃故實推廣祥傳更記寺名勝蹟以及靈異藥物其中多涉及儒家且有六朝人文如晉釋支遁文殊像贊序又殷晉安郄濟川讚并世所希見而遁序尤足補本集之所佚若王勃釋迦如來成道記釋迦佛賦今四傑集文苑英華俱無之是編或以為金大定時寺中藏版末附補陀傳峨嵋贊乃元人所集明釋又從而附綴之也案是書原本今在歸安陸氏皕宋樓實洪武丙子山西崇善寺所刊末綴寺僧性徹募刊緣起云重刊釋迦賦帝王崇教事迹成道記補陀傳清涼傳合部印施其王勃文二首各自為書不在延一傳又郄濟川宋嘉祐時人廣清涼傳序是其撰亦非六朝人此皆提要之誤補陀傳為元盛熙明撰熙明出處具陶九成書史會要提要亦未及攷性徹原刊無峨嵋贊天順壬午五臺廣緣寺重刊此書始坿綴之錢塘丁氏正修堂有鈔本乃據天順本影寫者行字悉同洪武本惟版縫刊施錢人姓名為異今王勃釋迦佛賦成道記已刊入清翊所注王子安集二十卷內崇教事迹多佞佛語峨眉贊尤鄙俚概削不刊惟刊清涼傳補陀傳云光緒甲申十月吳縣蔣清翊字敬臣識
