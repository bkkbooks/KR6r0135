front:
  text: 重雕清涼傳序白馬東來象教流行於中土玄風始暢或示禪寂以探宗或專神化而素法亦猶水行地中枝分別派雖異至於濟世利物之功其歸未始不同故唐劉夢得已為佛法在九州間隨其方而化因名山以為莊嚴國界凡言神道示現者必宗清涼焉按經言文殊師利宅東北清涼山與其眷屬住持古佛之法降大慈悲以接引群生或現真容以來歸依或發祥光以竦觀仰千變萬化隨感而應有不可形容擬議者何其異哉昔有沙門慧祥與延一者皆緇林助化之人洎丞相張公天覺皇華朱公少章皆大臣護法之士異世相望同心贊翼慮聖迹在遠未彰芳塵經久或熄乃廣搜見聞與目所親覩編次成帙慧祥始為清涼傳二卷延一復為廣傳三卷張相國朱奉使又為續傳記以附於後其他超俗談玄之流與夫高人達士作為詩頌贊偈附名傳末星聯珠貫粲然貝錦之文流行於世凡九州四海之內雖未躬詣靈巖目瞻聖迹但覽卷披文自然回思易慮益堅向善之心其外護之益未易可述偶回祿之搆災致龍文之俱燼不有興者聖功神化歲久弗傳東安趙統以酒官視局臺山慨然有感於心即白主僧願捐槖金以助緣僧正明淨語其屬曰茲事念之日久屬化宮之災用力有先後今因其請盡出粟帛以成其事僦工鏤板告成有日趙因造門屬余為序以冠其首明淨與前提點僧善誼相繼以書為請僕嘗謂道不在衣傳衣可以授道法不在文披文因以悟法僕既嘉趙侯用意之善而二高僧皆於清涼有大因緣者知非販佛以眩衆故為之書大定四年九月十七日古豐姚孝錫序
